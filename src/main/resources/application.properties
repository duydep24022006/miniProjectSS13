spring.application.name=miniProject

# ============================================================
# DATASOURCE - MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_eshop?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=24022006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# HIKARICP CONNECTION POOL (NFR-01: 10.000 concurrent users)
# ============================================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# REDIS CACHE (NFR-02: Latency < 50ms, giam tai 95% MySQL)
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# ============================================================
# JWT SECURITY (NFR-05: HS256+, no hardcode in source)
# ============================================================
app.jwt.secret=${JWT_SECRET:TechNovaSmartEShopSecretKey2025VeryLongKeyForHS256AlgorithmMinimum32Chars}
app.jwt.expiration-ms=86400000

# ============================================================
# SERVER
# ============================================================
server.port=8080
